services:
  postgres:
    image: postgres:17
    container_name: furniture-postgres
    environment:
      POSTGRES_DB: furniture
      POSTGRES_USER: furniture
      POSTGRES_PASSWORD: furniture
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furniture"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: furniture-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"

volumes:
  postgres-data: